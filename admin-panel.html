<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración — Bot WhatsApp Jumar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2335;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555b6e;
    --green: #25d366;
    --green-dim: rgba(37,211,102,0.12);
    --blue: #4a8fe8;
    --blue-dim: rgba(74,143,232,0.12);
    --amber: #f0a020;
    --amber-dim: rgba(240,160,32,0.12);
    --red: #e24b4a;
    --red-dim: rgba(226,75,74,0.12);
    --msg-bot-bg: #1a2a4a;
    --msg-bot-border: rgba(74,143,232,0.2);
    --msg-admin-bg: #2a1a3a;
    --msg-admin-border: rgba(167,139,250,0.25);
    --radius: 10px;
    --radius-sm: 6px;
    --font: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
  }

  :root.light-mode {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #efefef;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1a1a;
    --text2: #555555;
    --text3: #888888;
    --msg-bot-bg: #e3f2fd;
    --msg-bot-border: rgba(74,143,232,0.3);
    --msg-admin-bg: #f3e5f5;
    --msg-admin-border: rgba(167,139,250,0.3);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 260px 1fr;
  }

  /* ── Topbar ── */
  .topbar {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
  }
  .topbar-logo svg { flex-shrink: 0; }
  .topbar-sep { flex: 1; }
  .topbar-url {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--font-mono);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 260px;
  }
  .topbar-url input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    flex: 1;
    min-width: 0;
  }
  .topbar-url input::placeholder { color: var(--text3); }
  .dot-status {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot-status.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-status.offline { background: var(--red); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
    max-height: calc(100vh - 56px);
  }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .sidebar-section {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    padding: 8px 16px 4px;
    font-weight: 600;
  }
  .conv-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .conv-item:hover { background: var(--bg3); }
  .conv-item.active {
    background: var(--blue-dim);
    border-left-color: var(--blue);
  }
  .conv-item.paused { opacity: 0.6; }
  .conv-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text2);
    flex-shrink: 0;
  }
  .conv-meta { flex: 1; min-width: 0; }
  .conv-phone { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-nexp { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .conv-badge {
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    flex-shrink: 0;
  }
  .badge-bot { background: var(--green-dim); color: var(--green); }
  .badge-paused { background: var(--amber-dim); color: var(--amber); }
  .badge-escalated { background: var(--red-dim); color: var(--red); }
  .badge-pending { background: var(--blue-dim); color: var(--blue); }

  /* ── Main ── */
  main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    height: calc(100vh - 56px);
  }

  /* ── Chat header ── */
  .chat-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .chat-info { flex: 1; }
  .chat-title { font-size: 15px; font-weight: 600; }
  .chat-subtitle { font-size: 12px; color: var(--text2); margin-top: 1px; }

  /* ── INTERRUPTOR ── */
  .bot-toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 14px;
  }
  .bot-toggle-label { font-size: 13px; color: var(--text2); }
  .bot-toggle-label strong { color: var(--text); }
  .toggle-switch {
    position: relative;
    width: 44px; height: 24px;
    cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--red);
    border-radius: 12px;
    transition: background 0.25s;
  }
  .toggle-track::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.25s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--green); }
  .toggle-switch input:checked + .toggle-track::before { transform: translateX(20px); }
  .toggle-state {
    font-size: 12px; font-weight: 600;
    padding: 3px 8px; border-radius: 4px;
    min-width: 58px; text-align: center;
  }
  .toggle-state.bot-on { background: var(--green-dim); color: var(--green); }
  .toggle-state.bot-off { background: var(--amber-dim); color: var(--amber); }

  /* ── Mensajes ── */
  .messages-area {
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .messages-area::-webkit-scrollbar { width: 5px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .msg-row { display: flex; gap: 10px; max-width: 72%; }
  .msg-row.out { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.in { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }
  .msg-row.out .msg-avatar { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(74,143,232,0.25); }
  .msg-row.in .msg-avatar { background: var(--green-dim); color: var(--green); border: 1px solid rgba(37,211,102,0.25); }

  .msg-bubble {
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.55;
    max-width: 100%;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
  }
  .msg-row.out .msg-bubble {
    background: var(--msg-bot-bg);
    border: 1px solid var(--msg-bot-border);
    border-bottom-right-radius: 3px;
    color: var(--text);
  }
  .msg-row.out .msg-bubble.admin-msg {
    background: var(--msg-admin-bg);
    border-color: var(--msg-admin-border);
  }
  .msg-row.in .msg-bubble {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
    color: var(--text);
  }
  .msg-meta {
    font-size: 10px; color: var(--text3);
    margin-top: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .msg-row.out .msg-meta { justify-content: flex-end; }
  .msg-tag {
    font-size: 10px; font-weight: 600;
    padding: 1px 5px; border-radius: 3px;
  }
  .tag-bot { background: var(--blue-dim); color: var(--blue); }
  .tag-admin { background: rgba(167,139,250,0.15); color: #a78bfa; }

  /* Separador de fecha */
  .date-sep {
    text-align: center; font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 10px;
    margin: 4px 0;
  }
  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── Input área ── */
  .input-area {
    padding: 14px 20px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 42px; max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input-area textarea::placeholder { color: var(--text3); }
  .input-area textarea:focus { border-color: var(--blue); }
  .input-area textarea:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .send-btn {
    width: 42px; height: 42px; border-radius: var(--radius-sm);
    background: var(--blue);
    border: none; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .paused-notice {
    flex: 1;
    background: var(--amber-dim);
    border: 1px solid rgba(240,160,32,0.25);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--amber);
    display: none;
    align-items: center;
    gap: 8px;
  }

  /* ── Estado vacío ── */
  .empty-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
    font-size: 14px;
    padding: 40px;
    text-align: center;
  }
  .empty-icon { font-size: 40px; opacity: 0.4; }

  /* ── Toast notifs ── */
  #toasts {
    position: fixed;
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9999; pointer-events: none;
  }
  .toast {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    animation: slideIn 0.25s ease;
    pointer-events: auto;
    max-width: 300px;
    display: flex; gap: 8px; align-items: center;
  }
  .toast.success { border-color: rgba(37,211,102,0.35); color: var(--green); }
  .toast.error { border-color: rgba(226,75,74,0.35); color: var(--red); }
  .toast.info { border-color: rgba(74,143,232,0.35); color: var(--blue); }
  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar">
  <a class="topbar-logo" href="#">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#25d366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Manolita
  </a>
  <div class="topbar-sep"></div>
  <button onclick="toggleDarkMode()" title="Alternar modo claro/oscuro" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:0;display:flex;align-items:center;">
    <span id="themeIcon">🌙</span>
  </button>
  <div class="topbar-url">
    <span class="dot-status" id="connDot"></span>
    <input type="text" id="serverUrl" placeholder="http://localhost:3000" value="http://localhost:3000" />
    <button onclick="connectServer()" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:12px;padding:0;white-space:nowrap;">Conectar</button>
  </div>
</header>

<!-- ── Sidebar ── -->
<nav class="sidebar" id="sidebar">
  <div style="padding:0 16px;display:flex;flex-direction:column;gap:8px;padding-top:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="sidebar-section" style="margin:0;flex:1;">Conversaciones</div>
      <button onclick="loadConversations()" title="Actualizar" style="background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;display:flex;align-items:center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 2.2"/></svg>
      </button>
    </div>
    <input type="text" id="convSearch" placeholder="Buscar…"
      style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:12px;outline:none;font-family:var(--font);"
      oninput="filterConversations(this.value)" />
    <div style="font-size:11px;color:var(--text3);text-align:center;" id="convCount"></div>
  </div>
  <div id="convList" style="display:flex;flex-direction:column;gap:2px;margin-top:8px;">
    <div style="padding:16px;font-size:13px;color:var(--text3);text-align:center;">
      Conecta al servidor para ver las conversaciones
    </div>
  </div>
</nav>

<!-- ── Main ── -->
<main id="mainArea">
  <div class="chat-header" id="chatHeader" style="display:none;">
    <div class="msg-avatar" id="headerAvatar" style="width:36px;height:36px;font-size:13px;"></div>
    <div class="chat-info">
      <div class="chat-title" id="headerTitle"></div>
      <div class="chat-subtitle" id="headerSubtitle"></div>
    </div>
    <div class="bot-toggle-wrap">
      <div class="bot-toggle-label">Bot: <strong id="toggleLabel">activo</strong></div>
      <label class="toggle-switch" title="Pausar/Reanudar el bot para esta conversación">
        <input type="checkbox" id="botToggle" checked onchange="handleToggle(this)">
        <span class="toggle-track"></span>
      </label>
      <span class="toggle-state bot-on" id="toggleBadge">Activo</span>
    </div>
  </div>

  <!-- Mensajes -->
  <div class="messages-area" id="messagesArea">
    <div class="empty-chat" id="emptyChat">
      <div class="empty-icon">💬</div>
      <div>Selecciona una conversación o conecta al servidor para comenzar</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area" id="inputArea" style="display:none;">
    <div class="paused-notice" id="pausedNotice">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Bot pausado. El admin puede escribir mensajes manualmente.
    </div>
    <textarea id="msgInput" placeholder="Escribe un mensaje…" rows="1" disabled
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled title="Enviar mensaje">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</main>

<div id="toasts"></div>

<script>
const STATE = {
  serverUrl: 'http://localhost:3000',
  conversations: [],
  activeConvId: null,
  botPaused: {},
  pollTimer: null,
  connected: false,
  searchQuery: '',
  pollFailures: 0,
  pollInterval: 5000,
};

function $(id) { return document.getElementById(id); }

function toggleDarkMode() {
  const root = document.documentElement;
  const isLightMode = root.classList.contains('light-mode');
  root.classList.toggle('light-mode');
  $('themeIcon').textContent = isLightMode ? '🌙' : '☀️';
  localStorage.setItem('theme', isLightMode ? 'dark' : 'light');
}

// Restaurar tema al cargar
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light-mode');
    $('themeIcon').textContent = '☀️';
  }
});

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function setConnected(ok) {
  STATE.connected = ok;
  const dot = $('connDot');
  dot.className = 'dot-status ' + (ok ? 'online' : 'offline');
}

function getUrl() {
  return ($('serverUrl').value || 'http://localhost:3000').replace(/\/$/, '');
}

async function connectServer() {
  const url = getUrl();
  STATE.serverUrl = url;
  try {
    const r = await fetch(`${url}/health`, { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      setConnected(true);
      toast('Servidor conectado correctamente', 'success');
      await loadConversations();
      startPolling();
    } else {
      throw new Error(`HTTP ${r.status}`);
    }
  } catch (e) {
    setConnected(false);
    toast(`No se pudo conectar: ${e.message}`, 'error');
  }
}

async function loadConversations() {
  try {
    const r = await fetch(`${STATE.serverUrl}/admin/conversations`, { signal: AbortSignal.timeout(6000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    STATE.conversations = data.conversations || [];
    renderSidebar();
  } catch (e) {
    toast(`Error cargando conversaciones: ${e.message}`, 'error');
  }
}

function renderSidebar() {
  const list = $('convList');
  if (!STATE.conversations.length) {
    list.innerHTML = `<div style="padding:16px;font-size:13px;color:var(--text3);text-align:center;">Sin conversaciones activas</div>`;
    $('convCount').textContent = '0 conversaciones';
    return;
  }

  // Sincronizar botPaused desde el servidor
  STATE.conversations.forEach(c => {
    if (c.botPaused !== undefined) STATE.botPaused[c.waId] = c.botPaused;
  });

  let sortedConvs = [...STATE.conversations].sort((a, b) => {
    const ta = a.lastMessageAt || 0;
    const tb = b.lastMessageAt || 0;
    return tb - ta;
  });

  // Filtrar por búsqueda
  if (STATE.searchQuery.trim()) {
    const q = STATE.searchQuery.toLowerCase();
    const qDigitsOnly = q.replace(/\D/g, ''); // Solo dígitos para comparar teléfonos
    sortedConvs = sortedConvs.filter(conv => {
      const phone = formatPhone(conv.waId);
      const phoneDigitsOnly = conv.waId.replace(/\D/g, '');
      const nexp = (conv.nexp || '').toLowerCase();
      const stage = (conv.stage || '').toLowerCase();
      // Buscar en: teléfono formateado, teléfono sin formato, expediente y stage
      return phone.includes(q) ||
             phoneDigitsOnly.includes(qDigitsOnly) ||
             nexp.includes(q) ||
             stage.includes(q);
    });
  }

  $('convCount').textContent = `${sortedConvs.length}/${STATE.conversations.length} conversaciones`;

  list.innerHTML = sortedConvs.map(conv => {
    const id = conv.waId;
    const nexp = conv.nexp || '—';
    const phone = formatPhone(id);
    const initials = phone.replace(/\D/g, '').slice(-4, -2) || '??';
    const isPaused = conv.botPaused === true || STATE.botPaused[id];
    const stage = conv.stage || 'consent';
    const status = conv.status || 'pending';
    const badge = getBadge(stage, status, isPaused);
    const isActive = STATE.activeConvId === id;

    return `<div class="conv-item${isActive ? ' active' : ''}${isPaused ? ' paused' : ''}"
      onclick="selectConv('${id}')">
      <div class="conv-avatar">${initials}</div>
      <div class="conv-meta">
        <div class="conv-phone">${phone}</div>
        <div class="conv-nexp">${nexp} · ${stage}</div>
      </div>
      <span class="conv-badge ${badge.cls}">${badge.label}</span>
    </div>`;
  }).join('');
}

function getBadge(stage, status, isPaused) {
  if (isPaused) return { cls: 'badge-paused', label: 'Pausado' };
  if (status === 'escalated' || stage === 'escalated') return { cls: 'badge-escalated', label: 'Escalado' };
  if (stage === 'agendando') return { cls: 'badge-pending', label: 'Agendando' };
  if (stage === 'valoracion') return { cls: 'badge-pending', label: 'Valoración' };
  return { cls: 'badge-bot', label: 'Activo' };
}

function filterConversations(query) {
  STATE.searchQuery = query;
  renderSidebar();
}

function formatPhone(waId) {
  if (!waId) return '—';
  const d = String(waId).replace(/\D/g, '');
  if (d.startsWith('34') && d.length === 11) {
    return `+34 ${d.slice(2, 5)} ${d.slice(5, 8)} ${d.slice(8)}`;
  }
  return `+${d}`;
}

async function selectConv(waId) {
  STATE.activeConvId = waId;
  renderSidebar();

  const conv = STATE.conversations.find(c => c.waId === waId);
  if (!conv) {
    console.error('Conversación no encontrada:', waId);
    return;
  }

  // Mostrar header e input
  const chatHeader = $('chatHeader');
  const inputArea = $('inputArea');
  if (chatHeader) chatHeader.style.display = 'flex';
  if (inputArea) inputArea.style.display = 'flex';

  // Actualizar header
  const phone = formatPhone(waId);
  const initials = phone.replace(/\D/g, '').slice(-4, -2) || '??';
  const headerAvatar = $('headerAvatar');
  const headerTitle = $('headerTitle');
  const headerSubtitle = $('headerSubtitle');

  if (headerAvatar) headerAvatar.textContent = initials;
  if (headerTitle) headerTitle.textContent = phone;
  if (headerSubtitle) headerSubtitle.textContent = `Expediente: ${conv.nexp || '—'} · Stage: ${conv.stage || '—'} · Estado: ${conv.status || '—'}`;

  // Sincronizar botPaused desde el servidor
  const isPaused = conv.botPaused === true || STATE.botPaused[waId] || false;
  STATE.botPaused[waId] = isPaused;
  updateToggleUI(isPaused);

  await loadMessages(waId);
}

async function loadMessages(waId) {
  try {
    const r = await fetch(`${STATE.serverUrl}/admin/conversations/${waId}/messages`, { signal: AbortSignal.timeout(6000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    renderMessages(data.messages || [], waId);
  } catch(e) {
    toast(`Error cargando mensajes: ${e.message}`, 'error');
  }
}

function renderMessages(messages, waId) {
  const area = $('messagesArea');
  const isEmpty = $('emptyChat');

  if (!messages.length) {
    area.innerHTML = '<div class="empty-chat" id="emptyChat"><div class="empty-icon">💬</div><div>Sin mensajes en esta conversación</div></div>';
    return;
  }

  let html = '';
  let lastDate = '';

  messages.forEach(msg => {
    const isOut = msg.direction === 'out';
    const ts = msg.timestamp ? new Date(msg.timestamp) : null;
    const dateStr = ts ? ts.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }) : '';
    const timeStr = ts ? ts.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }) : '';
    const isAdmin = msg.fromAdmin === true;

    if (dateStr && dateStr !== lastDate) {
      html += `<div class="date-sep">${dateStr}</div>`;
      lastDate = dateStr;
    }

    const initials = isOut ? (isAdmin ? 'AD' : 'BOT') : 'US';
    const tag = isOut ? (isAdmin ? `<span class="msg-tag tag-admin">Admin</span>` : `<span class="msg-tag tag-bot">Bot</span>`) : '';
    const extraCls = isAdmin ? ' admin-msg' : '';

    html += `<div class="msg-row ${isOut ? 'out' : 'in'}">
      <div class="msg-avatar">${initials}</div>
      <div>
        <div class="msg-bubble${extraCls}">${escHtml(msg.text || '')}</div>
        <div class="msg-meta">${tag} ${timeStr}</div>
      </div>
    </div>`;
  });

  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function updateToggleUI(isPaused) {
  const toggle = $('botToggle');
  const badge = $('toggleBadge');
  const label = $('toggleLabel');
  const notice = $('pausedNotice');
  const input = $('msgInput');
  const sendBtn = $('sendBtn');

  toggle.checked = !isPaused;

  if (isPaused) {
    badge.textContent = 'Pausado';
    badge.className = 'toggle-state bot-off';
    label.textContent = 'pausado';
    notice.style.display = 'flex';
    input.disabled = false;
    input.placeholder = 'Escribe como admin…';
    sendBtn.disabled = false;
  } else {
    badge.textContent = 'Activo';
    badge.className = 'toggle-state bot-on';
    label.textContent = 'activo';
    notice.style.display = 'none';
    input.disabled = true;
    input.placeholder = 'Pausa el bot para escribir mensajes…';
    sendBtn.disabled = true;
  }
}

async function handleToggle(checkbox) {
  const waId = STATE.activeConvId;
  if (!waId) {
    checkbox.checked = !checkbox.checked;
    return;
  }

  const shouldPause = !checkbox.checked;

  try {
    const r = await fetch(`${STATE.serverUrl}/admin/conversations/${waId}/pause`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paused: shouldPause }),
      signal: AbortSignal.timeout(5000),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    STATE.botPaused[waId] = shouldPause;
    updateToggleUI(shouldPause);
    renderSidebar();
    toast(shouldPause ? 'Bot pausado. Puedes escribir como admin.' : 'Bot reactivado.', shouldPause ? 'info' : 'success');
  } catch (e) {
    checkbox.checked = !checkbox.checked;
    toast(`Error al cambiar estado: ${e.message}`, 'error');
  }
}

async function sendMessage() {
  const waId = STATE.activeConvId;
  const input = $('msgInput');
  const text = input.value.trim();

  if (!text || !waId) return;
  if (!STATE.botPaused[waId]) {
    toast('Pausa el bot para enviar mensajes como admin', 'error');
    return;
  }

  const sendBtn = $('sendBtn');
  sendBtn.disabled = true;

  try {
    const r = await fetch(`${STATE.serverUrl}/admin/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: waId, text }),
      signal: AbortSignal.timeout(8000),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    input.value = '';
    autoResize(input);
    await loadMessages(waId);
    toast('Mensaje enviado', 'success');
  } catch (e) {
    toast(`Error al enviar: ${e.message}`, 'error');
  } finally {
    sendBtn.disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function startPolling() {
  if (STATE.pollTimer) clearInterval(STATE.pollTimer);
  STATE.pollFailures = 0;
  STATE.pollInterval = 5000;

  const pollOnce = async () => {
    if (!STATE.connected) return;
    try {
      await loadConversations();
      // SIEMPRE cargar mensajes si hay conversación activa, incluso si el bot está pausado
      if (STATE.activeConvId) {
        await loadMessages(STATE.activeConvId);
      }
      // Reset on success
      if (STATE.pollFailures > 0) {
        STATE.pollFailures = 0;
        STATE.pollInterval = 5000;
      }
    } catch (e) {
      STATE.pollFailures++;
      // Backoff: double interval up to 30s on repeated failures
      if (STATE.pollFailures > 2) {
        STATE.pollInterval = Math.min(STATE.pollInterval * 1.5, 30000);
      }
    }
  };

  // Ejecutar inmediatamente la primera vez
  pollOnce();

  STATE.pollTimer = setInterval(pollOnce, 5000);
}

document.addEventListener('DOMContentLoaded', () => {
  connectServer();
});
</script>
